version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
      POSTGRES_DB: taskdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://taskuser:taskpass@postgres:5432/taskdb?schema=public
      JWT_ACCESS_SECRET: dev-access-secret-change-in-production-32chars
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production-32chars
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: http://localhost
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  # One-shot seed container
  seed:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://taskuser:taskpass@postgres:5432/taskdb?schema=public
    command: npx tsx prisma/seed.ts
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - seed

volumes:
  postgres_data:
  uploads_data:
